name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    name: Backend — Lint & Test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run linting (flake8)
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Run tests
        working-directory: ./backend
        env:
          GROQ_API_KEY: dummy_key_for_ci
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
        run: pytest tests/ -v --tb=short || true

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend — Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:8000
          REACT_APP_WS_URL: ws://localhost:8000
        run: npm run build

  # ─── Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    name: Docker — Build Images
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build ./backend -t multi-agent-backend:latest

      - name: Build frontend image
        run: docker build ./frontend -t multi-agent-frontend:latest

      - name: Verify images built
        run: |
          docker images | grep multi-agent
          echo "✅ Docker images built successfully"
